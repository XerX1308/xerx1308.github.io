<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal</title>
  <meta name="description" content="Signal — indie browser games: Capital, Afterlight.">
  
  <link rel="canonical" href="https://xerx1308.github.io/" />

  <meta property="og:title" content="Signal">
  <meta property="og:description" content="Signal — indie browser games: Capital, Afterlight.">
  <style>
    :root {
      --bg: #080a07;
      --bg-soft: #10140e;
      --ink: #eff2e7;
      --signal: #d9ff3f;
      --red: #ef332e;
      --red-dark: #941e24;
      --line: rgba(239, 242, 231, 0.12);
      --line-strong: rgba(239, 242, 231, 0.24);
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      scrollbar-color: rgba(239, 51, 46, 0.7) #050604;
      scrollbar-width: thin;
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      overflow-y: auto;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(180deg, rgba(239, 51, 46, 0.045), transparent 30rem),
        radial-gradient(circle at 18% 53%, rgba(217, 255, 63, 0.055), transparent 22rem),
        linear-gradient(135deg, #12160f 0%, var(--bg) 58%, #050604 100%);
    }

    ::-webkit-scrollbar { width: 12px; }
    ::-webkit-scrollbar-track { background: #050604; border-left: 1px solid rgba(239,242,231,0.08); }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(239,51,46,0.82), rgba(112,28,30,0.55));
      border: 4px solid #050604; border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(255,75,68,0.95), rgba(155,35,39,0.72));
    }

    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; opacity: 0.2;
      background:
        linear-gradient(90deg, rgba(239,242,231,0.05) 1px, transparent 1px),
        linear-gradient(180deg, rgba(239,242,231,0.032) 1px, transparent 1px);
      background-size: 72px 72px;
    }

    body::after {
      content: ""; position: fixed; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(180deg, rgba(239,242,231,0.026) 0, rgba(239,242,231,0.026) 1px, transparent 1px, transparent 8px);
      opacity: 0.26;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ── LAYOUT ── */
    .site {
      position: relative; z-index: 1;
      min-height: 100svh;
      padding: clamp(22px, 4vw, 46px);
      display: flex; flex-direction: column; align-items: center;
    }

    /* ── TOP BAR ── */
    .top-bar {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding-top: clamp(18px, 3vw, 36px);
      padding-bottom: clamp(10px, 2vw, 20px);
    }

    .identity {
      grid-column: 2;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      justify-self: center;
    }

    .logo-eye {
      width: clamp(52px, 6vw, 78px);
      height: auto;
      display: block;
      overflow: visible;
      filter: drop-shadow(0 0 18px rgba(239,51,46,0.12));
    }

    .pupil-group {
      transition: transform 130ms ease-out;
      transform-box: fill-box;
      transform-origin: center;
    }

    .wordmark {
      margin: 0;
      color: var(--ink);
      font-size: clamp(1.3rem, 3vw, 2.6rem);
      line-height: 0.92;
      font-weight: 900;
    }

    /* ── LANGUAGE BUTTON (single cycling button) ── */
    .lang-toggle {
      grid-column: 3;
      justify-self: end;
      position: relative;
    }

    .lang-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(239,51,46,0.07);
      border: 1px solid rgba(239,51,46,0.3);
      color: var(--ink);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      padding: 6px 12px 6px 10px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 150ms ease, border-color 150ms ease, transform 120ms ease;
      font-family: inherit;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .lang-btn:hover {
      background: rgba(239,51,46,0.15);
      border-color: rgba(239,51,46,0.6);
      transform: translateY(-1px);
    }

    .lang-btn svg {
      width: 13px; height: 13px;
      opacity: 0.55;
      flex-shrink: 0;
    }

    /* dropdown */
    .lang-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: #141710;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      overflow: hidden;
      min-width: 120px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.55);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity 140ms ease, transform 140ms ease;
      z-index: 50;
    }

    .lang-toggle.open .lang-dropdown {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    .lang-option {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      background: none;
      border: none;
      color: rgba(239,242,231,0.55);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease;
      text-align: left;
    }

    .lang-option:hover { background: rgba(239,51,46,0.1); color: var(--ink); }

    .lang-option.active {
      color: var(--ink);
      background: rgba(239,51,46,0.08);
    }

    .lang-option .flag {
      font-size: 1rem;
      line-height: 1;
    }

    /* ── LIBRARY ── */
    .library {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: clamp(20px, 3vh, 40px) clamp(0px, 2vw, 32px) clamp(32px, 6vh, 60px);
    }

    .games-grid {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(12px, 2vw, 26px);
      align-items: start;
    }

    /* ── GAME CARD 16:9 ── */
    .game-card {
      position: relative;
      display: block;
      aspect-ratio: 16 / 9;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: #050604;
      box-shadow: 0 20px 70px rgba(0,0,0,0.34);
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      isolation: isolate;
    }

    .game-card::after {
      content: ""; position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background:
        linear-gradient(180deg, transparent 48%, rgba(0,0,0,0.18)),
        repeating-linear-gradient(180deg, rgba(239,242,231,0.035) 0 1px, transparent 1px 7px);
      opacity: 0.42; transition: opacity 180ms ease;
    }

    .game-card img {
      width: 100%; height: 100%; object-fit: cover;
      filter: saturate(0.9) contrast(1.07) brightness(0.86);
      transition: transform 240ms ease, filter 180ms ease;
    }

    .game-card:hover, .game-card:focus-visible {
      outline: none;
      border-color: var(--line-strong);
      box-shadow: 0 24px 84px rgba(0,0,0,0.44), 0 0 28px rgba(239,51,46,0.09);
      transform: translateY(-3px);
    }

    .game-card:hover::after, .game-card:focus-visible::after { opacity: 0.24; }

    .game-card:hover img, .game-card:focus-visible img {
      transform: scale(1.025);
      filter: saturate(1) contrast(1.1) brightness(0.94);
    }

    .game-label {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
      padding: 10px 12px 8px;
      background: linear-gradient(0deg, rgba(0,0,0,0.72) 0%, transparent 100%);
      font-size: clamp(0.68rem, 1vw, 0.82rem);
      font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--ink);
      opacity: 0; transform: translateY(4px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .game-card:hover .game-label,
    .game-card:focus-visible .game-label { opacity: 1; transform: translateY(0); }

    /* ── DONATE ── */
    .donate-bar {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: clamp(12px, 2vh, 24px) 0 clamp(32px, 5vh, 56px);
    }

    .donate-label {
      font-size: 0.72rem;
      color: rgba(239,242,231,0.35);
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .donate-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 28px;
      border-radius: 9999px;
      border: 1px solid rgba(239,51,46,0.35);
      background: rgba(239,51,46,0.08);
      color: var(--ink);
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      text-decoration: none;
      transition: background 180ms ease, border-color 180ms ease, transform 160ms ease, box-shadow 180ms ease;
      backdrop-filter: blur(6px);
      font-family: inherit;
    }

    .donate-btn:hover {
      background: rgba(239,51,46,0.18);
      border-color: rgba(239,51,46,0.7);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(239,51,46,0.18);
    }

    .donate-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    @media (max-width: 820px) {
      .games-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 520px) {
      .games-grid { grid-template-columns: 1fr; }
      .top-bar { grid-template-columns: auto 1fr; grid-template-rows: auto auto; gap: 10px; }
      .identity { grid-column: 1 / -1; justify-self: center; }
      .lang-toggle { grid-column: 1 / -1; justify-self: center; }
    }
  </style>
</head>
<body>

  <div style="display:none;" aria-hidden="true">
    <h1>Signal - Interactive Games</h1>
    <p>Hand-coded minimalist web experiences by xerx1308.</p>
  </div>

  <main class="site">

    <div class="top-bar">

      <a class="identity" href="./" aria-label="Signal">
        <svg class="logo-eye" viewBox="0 0 180 96" role="img" aria-hidden="true">
          <path d="M10 48C33 14 68 6 90 6s57 8 80 42c-23 34-58 42-80 42S33 82 10 48Z" fill="#f0322d"/>
          <path d="M19 48C43 24 71 17 90 17s47 7 71 31c-24 24-52 31-71 31S43 72 19 48Z" fill="#9b2028" opacity="0.74"/>
          <g class="pupil-group">
            <ellipse cx="90" cy="49" rx="24" ry="30" fill="#060706"/>
            <circle cx="90" cy="33" r="15" fill="#ef332e"/>
          </g>
        </svg>
        <h1 class="wordmark">Signal</h1>
      </a>

      <div class="lang-toggle" id="langToggle">
        <button class="lang-btn" id="langBtn" aria-haspopup="listbox" aria-expanded="false">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.4"/>
            <path d="M8 1C8 1 5.5 4 5.5 8s2.5 7 2.5 7M8 1c0 0 2.5 3 2.5 7S8 15 8 15M1 8h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <span id="langBtnLabel">EN</span>
          <svg viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="width:9px;height:9px;opacity:0.4;">
            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <div class="lang-dropdown" role="listbox" id="langDropdown">
          <button class="lang-option active" data-lang="en" role="option">
            <span class="flag">🇬🇧</span> English
          </button>
          <button class="lang-option" data-lang="fr" role="option">
            <span class="flag">🇫🇷</span> Français
          </button>
          <button class="lang-option" data-lang="es" role="option">
            <span class="flag">🇪🇸</span> Español
          </button>
          <button class="lang-option" data-lang="ru" role="option">
            <span class="flag">🇷🇺</span> Русский
          </button>
        </div>
      </div>

    </div>

    <section class="library" aria-label="Games">
      <div class="games-grid">
        <a class="game-card" href="./capital.html">
          <img src="./assets/capital-cover.jpeg" alt="Capital game cover">
          <span class="game-label" data-i18n="game-capital">Capital</span>
        </a>
        <a class="game-card" href="./afterlight/">
          <img src="./assets/afterlight-cover.jpg" alt="Afterlight game cover">
          <span class="game-label" data-i18n="game-afterlight">Afterlight</span>
        </a>
      </div>
    </section>

    <div class="donate-bar">
      <span class="donate-label" data-i18n="donate-label">Support the project</span>
      <a
        class="donate-btn"
        href="https://www.paypal.com/donate/?business=xavvv0504@gmail.com&currency_code=EUR"
        target="_blank"
        rel="noopener noreferrer"
      >
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106zm14.146-14.42a3.35 3.35 0 0 0-.607-.541c-.013.076-.026.175-.041.254-.93 4.778-4.005 7.201-9.138 7.201h-2.19a.563.563 0 0 0-.556.479l-1.187 7.527h-.506l-.24 1.516a.56.56 0 0 0 .554.647h3.882c.46 0 .85-.334.922-.788.06-.26.76-4.852.816-5.09a.932.932 0 0 1 .923-.788h.58c3.76 0 6.705-1.528 7.565-5.946.36-1.847.174-3.388-.777-4.471z" fill="currentColor"/>
        </svg>
        <span data-i18n="donate-btn">Support Signal</span>
      </a>
    </div>

  </main>

  <script>
    /* ── PUPIL TRACKER ── */
    const eye   = document.querySelector('.logo-eye');
    const pupil = document.querySelector('.pupil-group');

    window.addEventListener('pointermove', e => {
      if (!eye || !pupil) return;
      const r  = eye.getBoundingClientRect();
      const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
      const dx = Math.max(-8, Math.min(8, ((e.clientX - cx) / r.width)  * 22));
      const dy = Math.max(-5, Math.min(5, ((e.clientY - cy) / r.height) * 14));
      pupil.style.transform = `translate(${dx}px, ${dy}px)`;
    }, { passive: true });

    window.addEventListener('pointerleave', () => {
      if (pupil) pupil.style.transform = 'translate(0,0)';
    }, { passive: true });

    /* ── i18n ── */
    const T = {
      en: {
        label:           'EN',
        'donate-label':  'Support the project',
        'donate-btn':    'Support Signal',
        'game-capital':  'Capital',
        'game-afterlight': 'Afterlight',
      },
      fr: {
        label:           'FR',
        'donate-label':  'Soutenir le projet',
        'donate-btn':    'Soutenir Signal',
        'game-capital':  'Capital',
        'game-afterlight': 'Afterlight',
      },
      es: {
        label:           'ES',
        'donate-label':  'Apoyar el proyecto',
        'donate-btn':    'Apoyar Signal',
        'game-capital':  'Capital',
        'game-afterlight': 'Afterlight',
      },
      ru: {
        label:           'РУ',
        'donate-label':  'Поддержать проект',
        'donate-btn':    'Поддержать Signal',
        'game-capital':  'Капитал',
        'game-afterlight': 'Afterlight',
      },
    };

    function applyLang(lang) {
      const t = T[lang] || T.en;

      document.documentElement.lang = lang;

      // button label
      document.getElementById('langBtnLabel').textContent = t.label;

      // all data-i18n elements
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (t[key] !== undefined) el.textContent = t[key];
      });

      // active option highlight
      document.querySelectorAll('.lang-option').forEach(o =>
        o.classList.toggle('active', o.dataset.lang === lang)
      );

      localStorage.setItem('signal-lang', lang);
    }

    /* ── DROPDOWN TOGGLE ── */
    const toggle   = document.getElementById('langToggle');
    const langBtn  = document.getElementById('langBtn');

    langBtn.addEventListener('click', e => {
      e.stopPropagation();
      const open = toggle.classList.toggle('open');
      langBtn.setAttribute('aria-expanded', open);
    });

    document.addEventListener('click', () => {
      toggle.classList.remove('open');
      langBtn.setAttribute('aria-expanded', 'false');
    });

    document.querySelectorAll('.lang-option').forEach(opt => {
      opt.addEventListener('click', e => {
        e.stopPropagation();
        applyLang(opt.dataset.lang);
        toggle.classList.remove('open');
        langBtn.setAttribute('aria-expanded', 'false');
      });
    });

    /* ── INIT ── */
    (function () {
      const saved   = localStorage.getItem('signal-lang');
      const browser = (navigator.language || '').slice(0, 2).toLowerCase();
      const lang    = (T[saved] ? saved : null) || (T[browser] ? browser : 'en');
      applyLang(lang);
    })();
  </script>
</body>
</html>
