<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal — Mini-games & Interactive Experiences</title>
  <meta name="description" content="Signal is a collection of minimalist mini-games and interactive web experiences created by xerx1308.">
  
  <link rel="canonical" href="https://xerx1308.github.io/Signal.github.io/" />

  <style>
    :root {
      --bg: #080a07; --bg-soft: #10140e; --ink: #eff2e7; --signal: #d9ff3f;
      --red: #ef332e; --red-dark: #941e24; --line: rgba(239, 242, 231, 0.12);
      --line-strong: rgba(239, 242, 231, 0.24);
    }
    * { box-sizing: border-box; }
    html { min-height: 100%; scrollbar-color: rgba(239, 51, 46, 0.7) #050604; scrollbar-width: thin; }
    body {
      min-height: 100%; margin: 0; color: var(--ink); overflow-y: auto; overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, rgba(239, 51, 46, 0.045), transparent 30rem),
                  radial-gradient(circle at 18% 53%, rgba(217, 255, 63, 0.055), transparent 22rem),
                  linear-gradient(135deg, #12160f 0%, var(--bg) 58%, #050604 100%);
    }
    body::before { content: ""; position: fixed; inset: 0; pointer-events: none; opacity: 0.2; background: linear-gradient(90deg, rgba(239,242,231,0.05) 1px, transparent 1px), linear-gradient(180deg, rgba(239,242,231,0.032) 1px, transparent 1px); background-size: 72px 72px; }
    .site { position: relative; z-index: 1; min-height: 100svh; padding: clamp(22px, 4vw, 46px); display: flex; flex-direction: column; align-items: center; }
    .top-bar { width: 100%; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: clamp(18px, 3vw, 36px) 0 clamp(10px, 2vw, 20px); }
    .identity { grid-column: 2; display: inline-flex; align-items: center; gap: 14px; justify-self: center; }
    .logo-eye { width: clamp(52px, 6vw, 78px); height: auto; filter: drop-shadow(0 0 18px rgba(239,51,46,0.12)); }
    .pupil-group { transition: transform 130ms ease-out; transform-box: fill-box; transform-origin: center; }
    .wordmark { margin: 0; color: var(--ink); font-size: clamp(1.3rem, 3vw, 2.6rem); line-height: 0.92; font-weight: 900; }
    .lang-toggle { grid-column: 3; justify-self: end; position: relative; }
    .lang-btn { display: inline-flex; align-items: center; gap: 7px; background: rgba(239,51,46,0.07); border: 1px solid rgba(239,51,46,0.3); color: var(--ink); font-size: 0.72rem; font-weight: 700; padding: 6px 12px; border-radius: 7px; cursor: pointer; text-transform: uppercase; }
    .lang-dropdown { position: absolute; top: calc(100% + 6px); right: 0; background: #141710; border: 1px solid var(--line-strong); border-radius: 8px; opacity: 0; pointer-events: none; transition: 140ms ease; z-index: 50; }
    .lang-toggle.open .lang-dropdown { opacity: 1; pointer-events: all; }
    .lang-option { display: flex; align-items: center; gap: 10px; width: 100%; background: none; border: none; color: rgba(239,242,231,0.55); padding: 9px 14px; cursor: pointer; font-size: 0.78rem; }
    .lang-option.active { color: var(--ink); background: rgba(239,51,46,0.08); }
    .library { width: 100%; display: flex; justify-content: center; padding: 40px 0; }
    .games-grid { width: 100%; max-width: 1100px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 26px; }
    .game-card { position: relative; aspect-ratio: 16/9; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: #050604; transition: 180ms ease; }
    .game-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); transition: 240ms ease; }
    .game-card:hover { transform: translateY(-3px); border-color: var(--line-strong); }
    .game-card:hover img { transform: scale(1.02); filter: brightness(0.9); }
    .game-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px; background: linear-gradient(0deg, rgba(0,0,0,0.7), transparent); font-weight: 700; color: var(--ink); opacity: 0; transition: 180ms ease; }
    .game-card:hover .game-label { opacity: 1; }
    .donate-bar { padding: 40px 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .donate-btn { display: inline-flex; align-items: center; gap: 10px; padding: 12px 24px; border-radius: 99px; border: 1px solid rgba(239,51,46,0.3); background: rgba(239,51,46,0.08); color: var(--ink); text-decoration: none; transition: 180ms ease; }
    .donate-btn:hover { background: rgba(239,51,46,0.15); transform: translateY(-2px); }
    @media (max-width: 820px) { .games-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 520px) { .games-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div style="display:none;">
    <h1>Signal - Mini-jeux par xerx1308</h1>
    <p>Une collection de jeux web minimalistes et d'expériences interactives.</p>
  </div>
  <main class="site">
    <div class="top-bar">
      <a class="identity" href="./">
        <svg class="logo-eye" viewBox="0 0 180 96">
          <path d="M10 48C33 14 68 6 90 6s57 8 80 42c-23 34-58 42-80 42S33 82 10 48Z" fill="#f0322d"/>
          <g class="pupil-group"><ellipse cx="90" cy="49" rx="24" ry="30" fill="#060706"/><circle cx="90" cy="33" r="15" fill="#ef332e"/></g>
        </svg>
        <h1 class="wordmark">Signal</h1>
      </a>
      <div class="lang-toggle" id="langToggle">
        <button class="lang-btn" id="langBtn">
          <span id="langBtnLabel">EN</span>
        </button>
        <div class="lang-dropdown" id="langDropdown">
          <button class="lang-option active" data-lang="en">English</button>
          <button class="lang-option" data-lang="fr">Français</button>
        </div>
      </div>
    </div>
    <section class="library">
      <div class="games-grid">
        <a class="game-card" href="./capital.html">
          <img src="./assets/capital-cover.jpeg" alt="Capital game">
          <span class="game-label">Capital</span>
        </a>
      </div>
    </section>
    <div class="donate-bar">
      <a class="donate-btn" href="https://www.paypal.com/donate/?business=xavvv0504@gmail.com&currency_code=EUR" target="_blank">Support Signal</a>
    </div>
  </main>
  <script>
    const eye = document.querySelector('.logo-eye');
    const pupil = document.querySelector('.pupil-group');
    window.addEventListener('pointermove', e => {
      const r = eye.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      const dx = Math.max(-8, Math.min(8, ((e.clientX-cx)/r.width)*22));
      const dy = Math.max(-5, Math.min(5, ((e.clientY-cy)/r.height)*14));
      pupil.style.transform = `translate(${dx}px, ${dy}px)`;
    });
    const toggle = document.getElementById('langToggle');
    document.getElementById('langBtn').addEventListener('click', () => toggle.classList.toggle('open'));
  </script>
</body>
</html>
